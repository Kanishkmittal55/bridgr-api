# Live reload for the HTTP API: https://github.com/air-verse/air
# Used by the default `api` service in docker-compose (WORKDIR /src, repo bind-mounted).
#
# Worker: use `.air.worker.toml` (second terminal: `air -c .air.worker.toml`).

root = "."
# Under /tmp (not ./tmp/...): Air mkdirs tmp_dir in one shot; nested paths fail if ./tmp is missing.
# Distinct path from .air.worker.toml so api + worker Compose services never clash.
tmp_dir = "/tmp/bridgr-air-api"

[build]
cmd           = "go mod download && go build -buildvcs=false -o /tmp/bridgr-air-api/main ./cmd/api"
bin           = "/tmp/bridgr-air-api/main"
include_ext   = ["go", "tpl", "tmpl", "html", "sum"]
exclude_dir   = ["assets", "tmp", "vendor", "terraform", "radar", "bin", "node_modules", "dist", ".git"]
delay         = 1000
stop_on_error = true
log           = "air_errors.log"

[log]
time = false

[color]
main    = "magenta"
watcher = "cyan"
build   = "yellow"
runner  = "green"

[misc]
clean_on_exit = true
