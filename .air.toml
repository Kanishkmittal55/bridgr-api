# Live reload for the HTTP API: https://github.com/air-verse/air
# Used by the default `api` service in docker-compose (WORKDIR /src, repo bind-mounted).
#
# For worker hot reload, copy to `.air.worker.toml` and point cmd/bin at `./cmd/worker`.

root = "."
tmp_dir = "tmp"

[build]
cmd           = "go mod download && go build -buildvcs=false -o ./tmp/main ./cmd/api"
bin           = "tmp/main"
include_ext   = ["go", "tpl", "tmpl", "html", "sum"]
exclude_dir   = ["assets", "tmp", "vendor", "terraform", "radar", "bin", "node_modules", "dist", ".git"]
delay         = 1000
stop_on_error = true
log           = "air_errors.log"

[log]
time = false

[color]
main    = "magenta"
watcher = "cyan"
build   = "yellow"
runner  = "green"

[misc]
clean_on_exit = true
