openapi: 3.1.0
info:
  title: Bridgr API
  description: Skill-gap navigator HTTP API (decoupled from hassleskip/users legacyapi).
  version: 1.0.0
servers:
  - url: http://localhost:8080
  - url: http://api:8080
paths:
  /v1/autograph/upload-url:
    post:
      summary: Generate a presigned URL for file upload
      description: |
        Generates a presigned S3 URL that allows the client to upload a file directly to S3. The returned s3_uri can then be used with the scraper/start endpoint to process the uploaded document.
      operationId: v1PostGenerateUploadUrl
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedUploadRequest'
      responses:
        '200':
          description: Presigned URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUploadResponse'
        '400':
          description: Invalid request (missing user_id or filename)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/ping:
    get:
      summary: Bridgr liveness
      description: Returns service identification for Bridgr / skill-gap mode smoke tests.
      operationId: V1GetBridgrPing
      tags:
        - bridgr
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrPingResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses:
    post:
      summary: Create skill-gap analysis
      description: Inserts a new analysis row (typically status pending; async worker consumes SQS).
      operationId: V1PostBridgrAnalyses
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBridgrSkillGapAnalysisRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapAnalysis'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}:
    get:
      summary: Get analysis by UUID
      operationId: V1GetBridgrAnalysis
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapAnalysis'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete analysis by UUID
      operationId: V1DeleteBridgrAnalysis
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}/status:
    patch:
      summary: Update analysis pipeline status
      description: Used by workers or admin to advance pending → extracting → graphed → pathed → completed/failed.
      operationId: V1PatchBridgrAnalysisStatus
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBridgrSkillGapAnalysisStatusRequest'
      responses:
        '200':
          description: Updated analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapAnalysis'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
