openapi: 3.1.0
info:
  title: Bridgr API
  description: Skill-gap navigator HTTP API (decoupled from hassleskip/users legacyapi).
  version: 1.0.0
servers:
  - url: http://localhost:8080
  - url: http://api:8080
paths:
  /v1/autograph/upload-url:
    post:
      summary: Generate a presigned URL for file upload
      description: |
        Generates a presigned S3 URL that allows the client to upload a file directly to S3. The returned s3_uri can then be used with the scraper/start endpoint to process the uploaded document.
      operationId: v1PostGenerateUploadUrl
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedUploadRequest'
      responses:
        '200':
          description: Presigned URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUploadResponse'
        '400':
          description: Invalid request (missing user_id or filename)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/ping:
    get:
      summary: Bridgr liveness
      description: Returns service identification for Bridgr / skill-gap mode smoke tests.
      operationId: V1GetBridgrPing
      tags:
        - bridgr
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrPingResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses:
    post:
      summary: Create skill-gap analysis
      description: Inserts a new analysis row (typically status pending; async worker consumes SQS).
      operationId: V1PostBridgrAnalyses
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBridgrSkillGapAnalysisRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapAnalysis'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}:
    get:
      summary: Get analysis by UUID
      operationId: V1GetBridgrAnalysis
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapAnalysis'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete analysis by UUID
      operationId: V1DeleteBridgrAnalysis
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}/status:
    patch:
      summary: Update analysis pipeline status
      description: Used by workers or admin to advance pending → extracting → graphed → pathed → completed/failed.
      operationId: V1PatchBridgrAnalysisStatus
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBridgrSkillGapAnalysisStatusRequest'
      responses:
        '200':
          description: Updated analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapAnalysis'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}/graphs:
    get:
      summary: List graphs for analysis
      description: Returns candidate and role_requirement graphs (if any) for the analysis.
      operationId: V1GetBridgrAnalysisGraphs
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Graphs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapGraphListResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Analysis not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create skill graph for analysis
      description: Inserts a candidate or role_requirement graph row for the analysis.
      operationId: V1PostBridgrAnalysisGraphs
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBridgrSkillGapGraphRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapGraph'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Analysis not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete all graphs for analysis
      description: Removes graph rows for the analysis (nodes/edges are normally cleared by workers or cascading app logic).
      operationId: V1DeleteBridgrAnalysisGraphs
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}/graphs/{kind}:
    get:
      summary: Get graph by analysis and kind
      operationId: V1GetBridgrAnalysisGraphByKind
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: kind
          in: path
          required: true
          description: candidate or role_requirement
          schema:
            $ref: '#/components/schemas/BridgrSkillGapGraphKind'
      responses:
        '200':
          description: Graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapGraph'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}/nodes/matched:
    get:
      summary: Matched skills (role nodes that exist on candidate graph)
      operationId: V1GetBridgrAnalysisNodesMatched
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Role-requirement nodes with a candidate counterpart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapNodeListResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Analysis not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}/nodes/unmatched:
    get:
      summary: Skill gaps (required role skills missing from candidate)
      operationId: V1GetBridgrAnalysisNodesUnmatched
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Role-requirement nodes with no candidate node_key match
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapNodeListResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Analysis not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}/learning-path:
    get:
      summary: Latest learning path for analysis
      description: Returns the row with highest path_version for the analysis.
      operationId: V1GetBridgrAnalysisLearningPath
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Learning path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapLearningPath'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create learning path for analysis
      operationId: V1PostBridgrAnalysisLearningPath
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBridgrSkillGapLearningPathRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapLearningPath'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Analysis not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete all learning path versions for analysis
      operationId: V1DeleteBridgrAnalysisLearningPath
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}/coverage:
    get:
      summary: Coverage snapshot for analysis
      description: Aggregated candidate vs required vs matched skill counts and coverage percentage.
      operationId: V1GetBridgrAnalysisCoverage
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapCoverageSnapshot'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Analysis not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}/assets/cv/read-url:
    get:
      summary: Get browser-readable URL for the analysis CV asset
      description: |
        Returns a short-lived presigned GET URL when `cv_asset_uri` is `s3://...`, or the same HTTPS URL
        when the CV was stored as a direct link. Use the URL in an iframe or PDF viewer (left pane in the console).
      operationId: V1GetBridgrAnalysisCvAssetReadUrl
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Read URL for the CV
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrAnalysisAssetReadUrlResponse'
        '400':
          description: Invalid or unsupported asset URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Analysis or CV asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: S3 not configured (for s3:// assets)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/analyses/{analysisUUID}/assets/jd/read-url:
    get:
      summary: Get browser-readable URL for the analysis job description asset
      description: |
        Same semantics as the CV read-url endpoint, using `jd_asset_uri` (S3 presign or direct HTTPS).
      operationId: V1GetBridgrAnalysisJdAssetReadUrl
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: analysisUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Read URL for the JD
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrAnalysisAssetReadUrlResponse'
        '400':
          description: Invalid or unsupported asset URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Analysis or JD asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: S3 not configured (for s3:// assets)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bridgr/graphs/{graphUUID}/nodes:
    get:
      summary: List nodes for graph
      operationId: V1GetBridgrGraphNodes
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: graphUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapNodeListResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Graph not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create graph node
      operationId: V1PostBridgrGraphNodes
      tags:
        - bridgr
      parameters:
        - name: X-API-KEY
          in: header
          description: API Key of the service making the request
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: graphUUID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBridgrSkillGapNodeRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgrSkillGapNode'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Graph not found
          content:
