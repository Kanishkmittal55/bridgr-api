components:
  schemas:
    PresignedUploadRequest:
      type: object
      required:
        - user_id
        - filename
      properties:
        user_id:
          type: integer
          format: int64
          description: The ID of the user requesting the upload URL.
          example: 123
        filename:
          type: string
          description: Name of the file to be uploaded (used to generate S3 key).
          example: business-report.pdf
        content_type:
          type: string
          description: |
            MIME type of the file. If not provided, will be inferred from filename extension.
          example: application/pdf
    PresignedUploadResponse:
      type: object
      properties:
        upload_url:
          type: string
          format: uri
          description: Presigned URL for uploading the file via HTTP PUT.
          example: https://s3.amazonaws.com/hassleskipbuckets/inputs/123/abc-uuid/file.pdf?X-Amz-...
        s3_key:
          type: string
          description: The S3 object key where the file will be stored.
          example: inputs/123/abc-uuid/file.pdf
        s3_uri:
          type: string
          format: uri
          description: The S3 URI to use with scraper/start endpoint (input_file_url).
          example: s3://hassleskipbuckets/inputs/123/abc-uuid/file.pdf
        expires_at:
          type: string
          format: date-time
          description: When the presigned URL expires.
          example: '2024-12-07T12:30:00Z'
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
    BridgrPingResponse:
      type: object
      required:
        - status
        - product
      properties:
        status:
          type: string
          example: ok
        product:
          type: string
          example: bridgr
    CreateBridgrSkillGapAnalysisRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: integer
          format: int32
        founder_persona_uuid:
          type: string
          format: uuid
          nullable: true
        pursuit_uuid:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          nullable: true
        cv_asset_uri:
          type: string
          nullable: true
        jd_asset_uri:
          type: string
          nullable: true
        cv_fingerprint:
          type: string
          nullable: true
        jd_fingerprint:
          type: string
          nullable: true
        llm_model:
          type: string
          nullable: true
        prompt_version:
          type: string
          nullable: true
    BridgrSkillGapAnalysisStatus:
      type: string
      description: Pipeline state aligned with async worker steps
      enum:
        - pending
        - extracting
        - graphed
        - pathed
        - completed
        - failed
      x-enum-varnames:
        - BridgrSkillGapPending
        - Extracting
        - Graphed
        - Pathed
        - Completed
        - Failed
    BridgrSkillGapAnalysis:
      type: object
      description: One CV/JD skill-gap analysis run
      required:
        - uuid
        - id
        - user_id
        - status
        - created_at
        - updated_at
      properties:
        uuid:
          type: string
          format: uuid
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int32
        founder_persona_uuid:
          type: string
          format: uuid
          nullable: true
        pursuit_uuid:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/BridgrSkillGapAnalysisStatus'
        cv_asset_uri:
          type: string
          nullable: true
        jd_asset_uri:
          type: string
          nullable: true
        cv_fingerprint:
          type: string
          nullable: true
        jd_fingerprint:
          type: string
          nullable: true
        llm_model:
          type: string
          nullable: true
        prompt_version:
          type: string
          nullable: true
        extraction_payload:
          type: object
          additionalProperties: true
          nullable: true
        gap_summary:
          type: object
          additionalProperties: true
          nullable: true
        mermaid_diagram:
          type: string
          nullable: true
        error_code:
          type: string
          nullable: true
        error_detail:
          type: string
          nullable: true
        sqs_message_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NotFoundErrorResponse:
      type: object
      required:
        - error
        - not_found_by_api
      properties:
        error:
          type: string
          description: Error message
        not_found_by_api:
          type: boolean
          description: |
            Always true. This key indicates that the API successfully fielded the request and that the specific resource requested
            was positively identified as not existing by the API.
            This key is used as a flag to distinguish 404s due to something not existing from other 404s such as mismatched routes or LB settings.
    UpdateBridgrSkillGapAnalysisStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/BridgrSkillGapAnalysisStatus'
    BridgrSkillGapGraphKind:
      type: string
      enum:
        - candidate
        - role_requirement
      description: candidate = skills from CV; role_requirement = skills from JD
    BridgrSkillGapGraph:
      type: object
      required:
