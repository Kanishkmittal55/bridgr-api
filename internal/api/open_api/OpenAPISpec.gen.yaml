        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete all graphs for analysis
      description: Removes graph rows for the analysis (nodes/edges are normally cleared by workers or cascading app logic).
