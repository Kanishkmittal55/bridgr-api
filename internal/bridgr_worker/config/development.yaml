# Bridgr worker — local / default (ENV unset or development)
polling_enabled: true
max_messages: 5
wait_time_seconds: 20
visibility_timeout: 300
poll_error_backoff_sec: 5

## Job discovery scheduler (profiles for the seeded default user; see discovery_scheduler.go).
discovery_scheduler_enabled: false
discovery_scheduler_trigger_interval: 1000 # seconds

# Discovery pipeline (Phase P0+): CV required for resume_text on FindJobs; set false only for local smoke without skill-gap rows.
discovery_require_canonical_cv: false
discovery_score_threshold: 0.65
discovery_prefilter_min_score: 0.5
discovery_max_iterations: 50
discovery_max_llm_calls_per_run: 30
discovery_iteration_time_budget_sec: 0
discovery_findjobs_page_cap: 20

discovery_llm_prefilter_enabled: false
discovery_llm_score_enabled: false
discovery_llm_query_refine_enabled: false
discovery_openai_model: gpt-4o-mini
discovery_openai_base_url: ""
