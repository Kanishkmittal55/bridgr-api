# Radar discovery search configuration
# Used by JobSpy, Workday, SmartExtract engines

queries:
  - query: "software engineer"
    tier: 1
  - query: "backend engineer"
    tier: 1
  - query: "data engineer"
    tier: 2

locations:
  - location: "London, UK"
    remote: false
  - location: "Remote"
    remote: true

location:
  accept_patterns:
    - "London"
    - "UK"
    - "Remote"
    - "Anywhere"
  reject_patterns: []

country: "UK"

defaults:
  results_per_site: 20
  hours_old: 168

boards:
  - indeed
  - linkedin
