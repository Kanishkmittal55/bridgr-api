package: bridgr
# Paths are relative to repo root when running `make oapi-gen`
output: internal/api/bridgr/bridgr.gen.go
generate:
  chi-server: true
output-options:
  include-tags:
    - bridgr
  exclude-schemas:
    - ErrorResponse
    - NotFoundErrorResponse
additional-imports:
  - package: github.com/Kanishkmittal55/bridgr-api/pkg/types
    alias: .
