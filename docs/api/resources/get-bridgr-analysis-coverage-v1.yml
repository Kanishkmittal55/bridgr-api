get:
  summary: Coverage snapshot for analysis
  description: Aggregated candidate vs required vs matched skill counts and coverage percentage.
  operationId: V1GetBridgrAnalysisCoverage
  tags:
    - bridgr
  parameters:
    - name: X-API-KEY
      in: header
      description: API Key of the service making the request
      required: true
      style: simple
      explode: false
      schema:
        type: string
    - name: analysisUUID
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    "200":
      description: Snapshot
      content:
        application/json:
          schema:
            $ref: '../schemas/BridgrSkillGapCoverageSnapshot.yml'
    "400":
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "404":
      description: Analysis not found
      content:
        application/json:
          schema:
            $ref: '../schemas/NotFoundErrorResponse.yml'
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
