get:
  summary: List job candidates for user
  operationId: V1GetBridgrUserJobCandidates
  tags:
    - bridgr
  parameters:
    - name: X-API-KEY
      in: header
      description: API Key of the service making the request
      required: true
      style: simple
      explode: false
      schema:
        type: string
    - name: userID
      in: path
      required: true
      schema:
        type: integer
        format: int32
    - name: limit
      in: query
      schema:
        type: integer
        format: int32
        default: 20
    - name: offset
      in: query
      schema:
        type: integer
        format: int32
        default: 0
    - name: discovery_run_uuid
      in: query
      description: Filter by discovery run
      schema:
        type: string
        format: uuid
        nullable: true
    - name: ingestion_status
      in: query
      schema:
        type: string
        nullable: true
    - name: source_board
      in: query
      schema:
        type: string
        nullable: true
  responses:
    "200":
      description: Candidates
      content:
        application/json:
          schema:
            $ref: '../schemas/BridgrJobCandidateListResponse.yml'
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
