patch:
  summary: Update notification (mark seen or status)
  operationId: V1PatchBridgrJobNotification
  tags:
    - bridgr
  parameters:
    - name: X-API-KEY
      in: header
      description: API Key of the service making the request
      required: true
      style: simple
      explode: false
      schema:
        type: string
    - name: notificationUUID
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/PatchBridgrJobNotificationRequest.yml'
  responses:
    "200":
      description: Updated notification
      content:
        application/json:
          schema:
            $ref: '../schemas/BridgrJobNotification.yml'
    "400":
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "404":
      description: Not found
      content:
        application/json:
          schema:
            $ref: '../schemas/NotFoundErrorResponse.yml'
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
