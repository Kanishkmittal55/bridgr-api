get:
  summary: List analyses with coverage for a user
  operationId: V1GetBridgrUserCoverage
  tags:
    - bridgr
  parameters:
    - name: X-API-KEY
      in: header
      description: API Key of the service making the request
      required: true
      style: simple
      explode: false
      schema:
        type: string
    - name: userID
      in: path
      required: true
      schema:
        type: integer
        format: int32
    - name: limit
      in: query
      schema:
        type: integer
        format: int32
        default: 20
    - name: offset
      in: query
      schema:
        type: integer
        format: int32
        default: 0
  responses:
    "200":
      description: Paginated coverage summaries
      content:
        application/json:
          schema:
            $ref: '../schemas/BridgrSkillGapUserCoverageListResponse.yml'
    "400":
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
