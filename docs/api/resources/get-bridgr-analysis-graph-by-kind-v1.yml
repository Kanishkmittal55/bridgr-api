get:
  summary: Get graph by analysis and kind
  operationId: V1GetBridgrAnalysisGraphByKind
  tags:
    - bridgr
  parameters:
    - name: X-API-KEY
      in: header
      description: API Key of the service making the request
      required: true
      style: simple
      explode: false
      schema:
        type: string
    - name: analysisUUID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: kind
      in: path
      required: true
      description: candidate or role_requirement
      schema:
        $ref: '../schemas/BridgrSkillGapGraphKind.yml'
  responses:
    "200":
      description: Graph
      content:
        application/json:
          schema:
            $ref: '../schemas/BridgrSkillGapGraph.yml'
    "400":
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "404":
      description: Not found
      content:
        application/json:
          schema:
            $ref: '../schemas/NotFoundErrorResponse.yml'
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
