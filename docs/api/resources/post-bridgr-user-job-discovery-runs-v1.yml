post:
  summary: Start a job discovery run (async via queue when configured)
  operationId: V1PostBridgrUserJobDiscoveryRuns
  tags:
    - bridgr
  parameters:
    - name: X-API-KEY
      in: header
      description: API Key of the service making the request
      required: true
      style: simple
      explode: false
      schema:
        type: string
    - name: userID
      in: path
      required: true
      schema:
        type: integer
        format: int32
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: '../schemas/CreateBridgrJobSearchDiscoveryRunRequest.yml'
  responses:
    "201":
      description: Run created (queued or completed in sync-dev mode)
      content:
        application/json:
          schema:
            $ref: '../schemas/BridgrJobSearchDiscoveryRun.yml'
    "400":
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "429":
      description: Rate limited (too many runs in the window)
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
