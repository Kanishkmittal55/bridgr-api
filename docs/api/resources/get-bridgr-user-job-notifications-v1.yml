get:
  summary: List job notifications for user
  operationId: V1GetBridgrUserJobNotifications
  tags:
    - bridgr
  parameters:
    - name: X-API-KEY
      in: header
      description: API Key of the service making the request
      required: true
      style: simple
      explode: false
      schema:
        type: string
    - name: userID
      in: path
      required: true
      schema:
        type: integer
        format: int32
    - name: limit
      in: query
      schema:
        type: integer
        format: int32
        default: 20
    - name: offset
      in: query
      schema:
        type: integer
        format: int32
        default: 0
    - name: since
      in: query
      description: Return rows with created_at strictly after this timestamp (RFC3339)
      schema:
        type: string
        format: date-time
        nullable: true
    - name: status
      in: query
      schema:
        type: string
        nullable: true
  responses:
    "200":
      description: Notifications
      content:
        application/json:
          schema:
            $ref: '../schemas/BridgrJobNotificationListResponse.yml'
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yml'
