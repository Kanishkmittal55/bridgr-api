type: object
description: |
  Start a discovery run for one job search profile (same enqueue path as the worker scheduler).
  When the user has more than one profile, job_search_profile_uuid is required.
properties:
  job_search_profile_uuid:
    type: string
    format: uuid
    nullable: true
    description: Profile to run; required if the user has multiple job search profiles
  request_params:
    type: object
    additionalProperties: true
    nullable: true
    description: Optional overrides merged into request_params after profile fields
