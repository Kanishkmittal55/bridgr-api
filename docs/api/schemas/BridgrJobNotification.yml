type: object
required:
  - uuid
  - id
  - user_id
  - job_candidate_uuid
  - channel
  - status
  - created_at
  - updated_at
properties:
  uuid:
    type: string
    format: uuid
  id:
    type: integer
    format: int64
  user_id:
    type: integer
    format: int32
  job_candidate_uuid:
    type: string
    format: uuid
  channel:
    type: string
  status:
    type: string
  payload:
    type: object
    additionalProperties: true
    nullable: true
  sent_at:
    type: string
    format: date-time
    nullable: true
  seen_at:
    type: string
    format: date-time
    nullable: true
  error_detail:
    type: string
    nullable: true
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
