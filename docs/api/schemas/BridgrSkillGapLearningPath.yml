type: object
required:
  - uuid
  - id
  - analysis_uuid
  - path_version
  - created_at
  - updated_at
properties:
  uuid:
    type: string
    format: uuid
  id:
    type: integer
    format: int64
  analysis_uuid:
    type: string
    format: uuid
  path_version:
    type: integer
    format: int32
  algorithm:
    type: string
    nullable: true
  title:
    type: string
    nullable: true
  path_metadata:
    type: object
    additionalProperties: true
    nullable: true
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
