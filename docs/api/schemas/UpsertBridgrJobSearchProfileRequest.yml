type: object
description: |
  Create or update a job search profile. Omitted keys leave existing DB values unchanged on update;
  on create, server defaults apply for missing columns (e.g. indeed, any goals, empty stack).
properties:
  target_role:
    type: string
    nullable: true
  location:
    type: string
    nullable: true
  source_board:
    type: string
    nullable: true
    description: Job board id for this search slice
    enum:
      - indeed
      - linkedin
      - glassdoor
  career_switch:
    type: boolean
    nullable: true
  company_stage:
    type: string
    nullable: true
    description: Employer company stage filter
    enum:
      - any
      - startup
      - growth
      - enterprise
  seniority_goal:
    type: string
    nullable: true
    description: Seniority direction for this slice
    enum:
      - any
      - up
      - lateral
      - down
  compensation_goal:
    type: string
    nullable: true
    description: Compensation direction for this slice
    enum:
      - any
      - up
      - lateral
      - down
  software_stack_must_have:
    type: array
    nullable: true
    items:
      type: string
  canonical_cv_analysis_uuid:
    type: string
    format: uuid
    nullable: true
