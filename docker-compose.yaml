# Local development. Use BuildKit for cache mounts and clearer builds:
#   export DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1
#
# Compose spec version (ignored by Compose V2 but kept for parity with monolith compose files).
version: "3.8"

name: bridgr-api

# Shared defaults (same idea as users repo x-hassleSkip-svc — avoid repetition).
x-bridgr-env: &bridgr-env
  env_file:
    - ./config/docker.development.env
  networks:
    - bridgrApi

# Go + Air at /src (repo bind-mount). Used by api and worker for live reload.
x-bridgr-air-service: &bridgr-air-service
  <<: *bridgr-env
  image: bridgr-api-air:${VERSION:-latest}
  build:
    context: .
    dockerfile: docker/api/Dockerfile.air
  environment:
    ENV: development
  volumes:
    - ${PWD:-.}:/src

services:
  postgres:
    image: postgres:16
    networks:
      - bridgrApi
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - ./db/migration-structure.sql:/migration-structure.sql
    environment:
      POSTGRES_USER: bridgr
      POSTGRES_PASSWORD: bridgr
      POSTGRES_DB: bridgr
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data
      PG_MAJOR_VERSION: "16"
    ports:
      - "5433:5432"
    entrypoint:
      - /docker-entrypoint-initdb.d/000-init.sh
    command:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridgr -d bridgr"]
      interval: 3s
      timeout: 5s
      retries: 10

  migrate:
    <<: *bridgr-env
    image: hassle-skip-migrate-local:latest
    build:
      context: .
      dockerfile: docker/migration/Dockerfile
    command: ["-verbose", "up"]
    volumes:
      - ./db/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # One-shot CSV seed (same pattern as users repo `seed` service). Loads ./internal/seeds/seeddata into Postgres.
  seed:
    <<: *bridgr-air-service
    command: ["sh", "-c", "go run ./cmd/seed"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    networks:
      - bridgrApi
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.8
    networks:
      - bridgrApi
    env_file:
      - ./config/docker.development.env
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - ./docker/localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ============================================================================
  # RADAR (Python gRPC: same ergonomic as users monolith — mount repo, optional GitHub token for builds)
  # Default command runs the server; override with RADAR_DOCKER_CMD + shell if you add watch (uv).
  # ============================================================================
  radar:
    <<: *bridgr-env
    image: bridgr-radar:${VERSION:-latest}
    container_name: bridgr-radar
    build:
      context: .
      dockerfile: docker/radar/Dockerfile
      secrets:
        - GITHUB_TOKEN
    command: ["python", "-m", "radar_service.grpc_server"]
    environment:
      SMARTEXTRACT_HEADLESS_ONLY: "true"
      UV_NO_PROGRESS: "1"
      UV_QUIET: "1"
    ports:
      - "50051:50051"
    volumes:
      # Mount repo like users/${PWD}:/hassleSkipApi — keeps radar/ + proto/ in sync on host
      - ${PWD:-.}:/app
      # Linux .venv inside container (optional; avoids macOS .venv on Linux mount)
      - radar-venv:/app/radar/.venv
    tty: true
    stdin_open: true
    stop_grace_period: 1s
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',50051)); s.close()",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 45s

  # HTTP API — Air live-reload on .go changes (repo mounted at /src).
  api:
    <<: *bridgr-air-service
    command: ["air", "-c", ".air.toml"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      localstack:
        condition: service_healthy
      radar:
        condition: service_healthy

  # Bridgr SQS worker — same Air image as api; .air.worker.toml writes build output under /tmp/bridgr-air-worker.
  worker:
    <<: *bridgr-air-service
    command: ["air", "-c", ".air.worker.toml"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
      radar:
        condition: service_healthy

volumes:
  radar-venv:

secrets:
  GITHUB_TOKEN:
    environment: GITHUB_TOKEN

networks:
  bridgrApi:
    name: bridgr-api-network
