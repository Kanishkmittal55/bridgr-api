name: bridgr-api

services:
  postgres:
    image: postgres:16
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - ./db/migration-structure.sql:/migration-structure.sql
    environment:
      POSTGRES_USER: bridgr
      POSTGRES_PASSWORD: bridgr
      POSTGRES_DB: bridgr
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data
      PG_MAJOR_VERSION: "16"
    ports:
      - "5433:5432"
    entrypoint:
      - /docker-entrypoint-initdb.d/000-init.sh
    command:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridgr -d bridgr"]
      interval: 3s
      timeout: 5s
      retries: 10

  migrate:
    image: hassle-skip-migrate-local:latest
    build:
      context: .
      dockerfile: docker/migration/Dockerfile
    command: ["-verbose", "up"]
    environment:
      POSTGRES_USER: bridgr
      POSTGRES_PASSWORD: bridgr
      POSTGRES_HOST: postgres
      DB_NAME: bridgr
    volumes:
      - ./db/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - ./docker/localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build:
      context: ..
      dockerfile: bridgr-api/Dockerfile
    command: ["/usr/local/bin/bridgr-api"]
    environment:
      ENV: development
      PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: bridgr
      POSTGRES_PASSWORD: bridgr
      POSTGRES_DB: bridgr
      POSTGRES_SSL_MODE_DISABLED: "true"
      S3_URL: http://minio:9000
      S3_EXTERNAL_URL: http://localhost:9000
      S3_USER: minioadmin
      S3_PASSWORD: minioadmin
      HASSLE_SKIP_S3_BUCKET: bridgr
      AWS_REGION: us-east-1
      SQS_ENDPOINT: http://localstack:4566
      SQS_BRIDGR_QUEUE_URL: http://localstack:4566/000000000000/bridgr-skill-gap
      BRIDGR_ALL_ACCESS_API_KEY: test-all-access-key
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      localstack:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: bridgr-api/Dockerfile
    command: ["/usr/local/bin/bridgr-worker"]
    environment:
      ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: bridgr
      POSTGRES_PASSWORD: bridgr
      POSTGRES_DB: bridgr
      POSTGRES_SSL_MODE_DISABLED: "true"
      AWS_REGION: us-east-1
      SQS_ENDPOINT: http://localstack:4566
      SQS_BRIDGR_QUEUE_URL: http://localstack:4566/000000000000/bridgr-skill-gap
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
