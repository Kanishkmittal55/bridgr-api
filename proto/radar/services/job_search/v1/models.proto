syntax = "proto3";

package radar.services.job_search.v1;

option go_package = "github.com/Kanishkmittal55/bridgr-api/internal/gen/radar/services/job_search/v1;jobsearchv1";

message JobInfo {
  string job_url = 1;
  string title = 2;
  string company = 3;
  repeated string requirements = 4;
}

message UserInfo {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string phone = 4;
  string address = 5;
  string city = 6;
  string postal_code = 7;
  string country = 8;
}
