# Live reload for bridgr-worker: https://github.com/air-verse/air
# Run from bridgr-api: air -c .air.worker.toml

root = "."
# Under /tmp (not ./tmp/...): see .air.toml — nested ./tmp/api paths break when ./tmp does not exist.
tmp_dir = "/tmp/bridgr-air-worker"

[build]
cmd           = "go mod download && go build -buildvcs=false -o /tmp/bridgr-air-worker/worker ./cmd/worker"
bin           = "/tmp/bridgr-air-worker/worker"
include_ext   = ["go", "tpl", "tmpl", "html", "sum"]
exclude_dir   = ["assets", "tmp", "vendor", "terraform", "radar", "bin", "node_modules", "dist", ".git"]
delay         = 1000
stop_on_error = true
log           = "air_worker_errors.log"

[log]
time = false

[color]
main    = "blue"
watcher = "cyan"
build   = "yellow"
runner  = "green"

[misc]
clean_on_exit = true
